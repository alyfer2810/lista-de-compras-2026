<!DOCTYPE html>
<html>
<head>
    <title>Teste Supabase</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>Teste de Conexão Supabase</h1>
    <div id="status">Testando...</div>
    <hr>
    <h3>Adicionar Produto Teste</h3>
    <input type="text" id="nome" placeholder="Nome do produto">
    <button onclick="adicionarProduto()">Adicionar</button>
    <hr>
    <div id="lista"></div>

    <script type="module">
        // Suas credenciais
        const SUPABASE_URL = 'https://pquobavzpooyygfoczpn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxdW9iYXZ6cG9veXlnZm9jenBuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMTE5NDQsImV4cCI6MjA4NzY4Nzk0NH0.-6WeJxqq_bzYD0chC1SF2iZzpK96FzWtl3xmcjeuRi4';
        
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const statusDiv = document.getElementById('status');
        const listaDiv = document.getElementById('lista');
        
        // Verificar conexão
        async function testarConexao() {
            try {
                const { data, error } = await supabase.from('items').select('count', { count: 'exact', head: true });
                if (error) throw error;
                statusDiv.innerHTML = '✅ Conexão OK!';
                statusDiv.style.color = 'green';
            } catch (error) {
                statusDiv.innerHTML = `❌ Erro: ${error.message}`;
                statusDiv.style.color = 'red';
            }
        }
        
        // Listar produtos
        async function listarProdutos() {
            const { data, error } = await supabase.from('items').select('*');
            if (error) {
                listaDiv.innerHTML = `Erro: ${error.message}`;
                return;
            }
            
            if (!data || data.length === 0) {
                listaDiv.innerHTML = 'Nenhum produto encontrado';
                return;
            }
            
            listaDiv.innerHTML = '<ul>' + data.map(p => `<li>${p.nome} - R$ ${p.preco || 0}</li>`).join('') + '</ul>';
        }
        
        // Adicionar produto
        window.adicionarProduto = async function() {
            const nome = document.getElementById('nome').value;
            if (!nome) {
                alert('Digite um nome!');
                return;
            }
            
            // Primeiro, pegar o usuário logado
            const { data: { user } } = await supabase.auth.getUser();
            
            if (!user) {
                alert('Usuário não logado! Faça login primeiro.');
                return;
            }
            
            const produto = {
                nome: nome,
                preco: 10.00,
                user_id: user.id
            };
            
            console.log('Enviando:', produto);
            
            const { data, error } = await supabase.from('items').insert([produto]).select();
            
            if (error) {
                alert('Erro: ' + error.message);
                console.error(error);
            } else {
                alert('Produto adicionado!');
                document.getElementById('nome').value = '';
                listarProdutos();
            }
        };
        
        testarConexao();
        listarProdutos();
    </script>
</body>
</html>
