<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1" id="theme-color">
    <link rel="shortcut icon" href="src/img/favicon.ico" type="image/x-icon">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="src/css/index.css">
    <title>Lista 2026 · Minhas Compras</title>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo-area">
                    <div class="logo-icon">🛒</div>
                    <h1 class="logo-text">Lista<span>2026</span></h1>
                </div>
                <div class="header-actions">
                    <button class="theme-toggle" id="theme-toggle" aria-label="Alternar tema">
                        <span class="theme-icon">🌙</span>
                    </button>
                    <button class="btn-logout" onclick="logout()" title="Sair">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="user-info">
                <span class="user-email" id="user-email">carregando...</span>
            </div>
        </header>

        <!-- Dashboard de Valores -->
        <div class="dashboard">
            <div class="dashboard-card total">
                <div class="dashboard-icon">💰</div>
                <div class="dashboard-info">
                    <span class="dashboard-label">Total da Lista</span>
                    <span class="dashboard-value" id="total-geral">R$ 0,00</span>
                </div>
            </div>
            <div class="dashboard-card pendente">
                <div class="dashboard-icon">⏳</div>
                <div class="dashboard-info">
                    <span class="dashboard-label">A Gastar</span>
                    <span class="dashboard-value" id="total-pendente">R$ 0,00</span>
                </div>
            </div>
            <div class="dashboard-card comprado">
                <div class="dashboard-icon">✅</div>
                <div class="dashboard-info">
                    <span class="dashboard-label">Já Gastou</span>
                    <span class="dashboard-value" id="total-comprado">R$ 0,00</span>
                </div>
            </div>
        </div>

        <!-- Barra de Progresso -->
        <div class="progress-section">
            <div class="progress-header">
                <span>Progresso da Lista</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <!-- Filtros Rápidos -->
        <div class="filters-bar">
            <button class="filter-btn active" data-filter="all">📋 Todos</button>
            <button class="filter-btn" data-filter="pending">⏳ Pendentes</button>
            <button class="filter-btn" data-filter="completed">✅ Comprados</button>
            <button class="filter-btn" data-filter="high">🔴 Alta Prioridade</button>
        </div>

        <!-- Categorias -->
        <div class="categories-scroll">
            <button class="category-chip active" data-categoria="todos">🏠 Todos</button>
            <button class="category-chip" data-categoria="mercearia">🥫 Mercearia</button>
            <button class="category-chip" data-categoria="hortifruti">🥬 Hortifrúti</button>
            <button class="category-chip" data-categoria="carnes">🥩 Carnes</button>
            <button class="category-chip" data-categoria="laticinios">🥛 Laticínios</button>
            <button class="category-chip" data-categoria="bebidas">🥤 Bebidas</button>
            <button class="category-chip" data-categoria="limpeza">🧹 Limpeza</button>
            <button class="category-chip" data-categoria="higiene">🧴 Higiene</button>
            <button class="category-chip" data-categoria="eletronicos">📱 Eletrônicos</button>
            <button class="category-chip" data-categoria="outros">📦 Outros</button>
        </div>

        <!-- Lista de Itens -->
        <main class="main-content">
            <ul id="lista" class="shopping-list"></ul>
        </main>

        <!-- Botão Flutuante -->
        <button class="fab" id="fab" onclick="openModal()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
        </button>

        <!-- Modal de Adicionar/Editar -->
        <div id="modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">Adicionar Item</h2>
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                </div>
                <form id="item-form">
                    <input type="hidden" id="item-id">
                    
                    <!-- Nome do Item -->
                    <div class="form-group">
                        <label>Nome do produto *</label>
                        <input type="text" id="item-nome" required placeholder="Ex: Arroz, Feijão, Leite...">
                    </div>

                    <!-- Marca -->
                    <div class="form-group">
                        <label>🏷️ Marca</label>
                        <input type="text" id="item-marca" placeholder="Ex: Tio João, Nestlé, Omo...">
                    </div>

                    <!-- Quantidade e Unidade -->
                    <div class="form-row">
                        <div class="form-group">
                            <label>📦 Quantidade</label>
                            <input type="number" id="item-quantidade" value="1" min="0.01" step="0.01">
                        </div>
                        <div class="form-group">
                            <label>Unidade</label>
                            <select id="item-unidade">
                                <option value="un">Unidade(s)</option>
                                <option value="kg">Quilograma (kg)</option>
                                <option value="g">Grama (g)</option>
                                <option value="l">Litro (l)</option>
                                <option value="ml">Mililitro (ml)</option>
                                <option value="pac">Pacote</option>
                                <option value="lata">Lata</option>
                                <option value="cx">Caixa</option>
                                <option value="fd">Fardo</option>
                            </select>
                        </div>
                    </div>

                    <!-- Preço e Categoria -->
                    <div class="form-row">
                        <div class="form-group">
                            <label>💰 Preço unitário (R$)</label>
                            <input type="number" id="item-preco" step="0.01" placeholder="0,00">
                        </div>
                        <div class="form-group">
                            <label>📂 Categoria</label>
                            <select id="item-categoria">
                                <option value="mercearia">🥫 Mercearia</option>
                                <option value="hortifruti">🥬 Hortifrúti</option>
                                <option value="carnes">🥩 Carnes</option>
                                <option value="laticinios">🥛 Laticínios</option>
                                <option value="bebidas">🥤 Bebidas</option>
                                <option value="limpeza">🧹 Limpeza</option>
                                <option value="higiene">🧴 Higiene</option>
                                <option value="eletronicos">📱 Eletrônicos</option>
                                <option value="outros">📦 Outros</option>
                            </select>
                        </div>
                    </div>

                    <!-- Prioridade -->
                    <div class="form-group">
                        <label>⚡ Prioridade</label>
                        <div class="priority-buttons">
                            <button type="button" class="priority-btn alta" data-prioridade="1">🔴 Alta</button>
                            <button type="button" class="priority-btn media" data-prioridade="2">🟡 Média</button>
                            <button type="button" class="priority-btn baixa" data-prioridade="3">🟢 Baixa</button>
                        </div>
                        <input type="hidden" id="item-prioridade" value="2">
                    </div>

                    <!-- Descrição/Observação -->
                    <div class="form-group">
                        <label>📝 Descrição / Observação</label>
                        <textarea id="item-observacao" rows="3" placeholder="Marca específica, local de compra, validade, etc..."></textarea>
                    </div>

                    <!-- Link da imagem (opcional) -->
                    <div class="form-group">
                        <label>🖼️ URL da imagem (opcional)</label>
                        <input type="url" id="item-imagem" placeholder="https://exemplo.com/imagem.jpg">
                    </div>

                    <div class="modal-buttons">
                        <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
                        <button type="submit" class="btn-save">Salvar</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Modal de Detalhes do Item -->
        <div id="detail-modal" class="modal">
            <div class="modal-content detail-modal">
                <div class="modal-header">
                    <h2>Detalhes do Produto</h2>
                    <button class="modal-close" onclick="closeDetailModal()">&times;</button>
                </div>
                <div id="detail-content" class="detail-content"></div>
            </div>
        </div>
    </div>

    <script type="module">
        // ============================================
        // CONFIGURAÇÃO DO SUPABASE
        // ============================================
        const SUPABASE_URL = 'https://pquobavzpooyygfoczpn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxdW9iYXZ6cG9veXlnZm9jenBuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMTE5NDQsImV4cCI6MjA4NzY4Nzk0NH0.-6WeJxqq_bzYD0chC1SF2iZzpK96FzWtl3xmcjeuRi4';
        
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // ============================================
        // VARIÁVEIS GLOBAIS
        // ============================================
        let currentUser = null;
        let allItems = [];
        let currentFilter = 'all';
        let currentCategoria = 'todos';
        let subscription = null;
        
        // Elementos
        const listaElement = document.getElementById('lista');
        const userEmailSpan = document.getElementById('user-email');
        const themeToggle = document.getElementById('theme-toggle');
        const modal = document.getElementById('modal');
        const detailModal = document.getElementById('detail-modal');
        const itemForm = document.getElementById('item-form');
        
        // Mapeamento
        const categoriaIcones = {
            mercearia: '🥫',
            hortifruti: '🥬',
            carnes: '🥩',
            laticinios: '🥛',
            bebidas: '🥤',
            limpeza: '🧹',
            higiene: '🧴',
            eletronicos: '📱',
            outros: '📦'
        };
        
        const prioridadeCores = {
            1: { cor: '#ef4444', texto: 'Alta', icon: '🔴' },
            2: { cor: '#f59e0b', texto: 'Média', icon: '🟡' },
            3: { cor: '#10b981', texto: 'Baixa', icon: '🟢' }
        };
        
        // ============================================
        // FUNÇÕES DE UI
        // ============================================
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            const icon = themeToggle?.querySelector('.theme-icon');
            if(icon) icon.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
        }
        
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            const icon = themeToggle?.querySelector('.theme-icon');
            if(icon) icon.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        }
        
        function showToast(message, type = 'info') {
            const existingToast = document.querySelector('.toast');
            if(existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span>${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'}</span> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        function escapeHtml(text) {
            if(!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatMoney(value) {
            if(!value || isNaN(value)) return 'R$ 0,00';
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(value);
        }
        
        // ============================================
        // CRUD OPERATIONS
        // ============================================
        window.openModal = function(itemId = null) {
            if(itemId) {
                document.getElementById('modal-title').textContent = 'Editar Item';
                const item = allItems.find(i => i.id === itemId);
                if(item) {
                    document.getElementById('item-id').value = item.id;
                    document.getElementById('item-nome').value = item.nome;
                    document.getElementById('item-marca').value = item.marca || '';
                    document.getElementById('item-quantidade').value = item.quantidade || 1;
                    document.getElementById('item-unidade').value = item.unidade || 'un';
                    document.getElementById('item-preco').value = item.preco || '';
                    document.getElementById('item-categoria').value = item.categoria || 'outros';
                    document.getElementById('item-prioridade').value = item.prioridade || 2;
                    document.getElementById('item-observacao').value = item.observacao || '';
                    document.getElementById('item-imagem').value = item.imagem || '';
                    
                    document.querySelectorAll('.priority-btn').forEach(btn => {
                        btn.classList.remove('active');
                        if(btn.dataset.prioridade == item.prioridade) {
                            btn.classList.add('active');
                        }
                    });
                }
            } else {
                document.getElementById('modal-title').textContent = 'Adicionar Item';
                itemForm.reset();
                document.getElementById('item-id').value = '';
                document.getElementById('item-quantidade').value = 1;
                document.getElementById('item-prioridade').value = 2;
                document.querySelectorAll('.priority-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if(btn.dataset.prioridade == 2) btn.classList.add('active');
                });
            }
            modal.classList.add('show');
        };
        
        window.closeModal = function() {
            modal.classList.remove('show');
        };
        
        window.openDetailModal = function(itemId) {
            const item = allItems.find(i => i.id === itemId);
            if(!item) return;
            
            const total = (item.preco || 0) * (item.quantidade || 1);
            
            const detailContent = document.getElementById('detail-content');
            detailContent.innerHTML = `
                <div class="detail-image">
                    ${item.imagem ? `<img src="${escapeHtml(item.imagem)}" alt="${escapeHtml(item.nome)}">` : '<div class="no-image">🛒</div>'}
                </div>
                <div class="detail-info">
                    <h3>${escapeHtml(item.nome)}</h3>
                    ${item.marca ? `<p class="detail-marca">🏷️ ${escapeHtml(item.marca)}</p>` : ''}
                    <p class="detail-categoria">${categoriaIcones[item.categoria] || '📦'} ${item.categoria}</p>
                    <p class="detail-prioridade" style="color: ${prioridadeCores[item.prioridade]?.cor}">
                        ${prioridadeCores[item.prioridade]?.icon} Prioridade: ${prioridadeCores[item.prioridade]?.texto}
                    </p>
                    <div class="detail-preco">
                        <div class="detail-preco-item">
                            <span>Quantidade:</span>
                            <strong>${item.quantidade || 1} ${item.unidade || 'un'}</strong>
                        </div>
                        <div class="detail-preco-item">
                            <span>Preço unitário:</span>
                            <strong>${formatMoney(item.preco)}</strong>
                        </div>
                        <div class="detail-preco-item total">
                            <span>Total:</span>
                            <strong>${formatMoney(total)}</strong>
                        </div>
                    </div>
                    ${item.observacao ? `<div class="detail-obs">📝 ${escapeHtml(item.observacao)}</div>` : ''}
                    <div class="detail-status">
                        <span>Status:</span>
                        <span class="status-badge ${item.comprado ? 'comprado' : 'pendente'}">
                            ${item.comprado ? '✅ Comprado' : '⏳ Pendente'}
                        </span>
                    </div>
                </div>
            `;
            
            detailModal.classList.add('show');
        };
        
        window.closeDetailModal = function() {
            detailModal.classList.remove('show');
        };
        
        // Configurar botões de prioridade
        document.querySelectorAll('.priority-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.priority-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('item-prioridade').value = btn.dataset.prioridade;
            });
        });
        
        // Salvar item
        itemForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('item-id').value;
            const nome = document.getElementById('item-nome').value.trim();
            const marca = document.getElementById('item-marca').value.trim();
            const quantidade = parseFloat(document.getElementById('item-quantidade').value) || 1;
            const unidade = document.getElementById('item-unidade').value;
            const preco = parseFloat(document.getElementById('item-preco').value) || null;
            const categoria = document.getElementById('item-categoria').value;
            const prioridade = parseInt(document.getElementById('item-prioridade').value);
            const observacao = document.getElementById('item-observacao').value;
            const imagem = document.getElementById('item-imagem').value;
            
            if(!nome) {
                showToast('Digite o nome do item', 'error');
                return;
            }
            
            const itemData = {
                nome,
                marca,
                quantidade,
                unidade,
                preco,
                categoria,
                prioridade,
                observacao,
                imagem,
                user_id: currentUser.id
            };
            
            try {
                if(id) {
                    const { error } = await supabase
                        .from('items')
                        .update(itemData)
                        .eq('id', id)
                        .eq('user_id', currentUser.id);
                    
                    if(error) throw error;
                    showToast('Item atualizado!', 'success');
                } else {
                    const { error } = await supabase
                        .from('items')
                        .insert([itemData]);
                    
                    if(error) throw error;
                    showToast('Item adicionado!', 'success');
                }
                closeModal();
            } catch (error) {
                console.error(error);
                showToast('Erro ao salvar item: ' + error.message, 'error');
            }
        });
        
        window.toggleComprado = async function(itemId, compradoAtual) {
            try {
                const { error } = await supabase
                    .from('items')
                    .update({ comprado: !compradoAtual })
                    .eq('id', itemId)
                    .eq('user_id', currentUser.id);
                
                if(error) throw error;
            } catch (error) {
                showToast('Erro ao atualizar', 'error');
            }
        };
        
        window.removerItem = async function(itemId) {
            if(!confirm('Tem certeza que deseja remover este item?')) return;
            
            try {
                const { error } = await supabase
                    .from('items')
                    .delete()
                    .eq('id', itemId)
                    .eq('user_id', currentUser.id);
                
                if(error) throw error;
                showToast('Item removido!', 'success');
            } catch (error) {
                showToast('Erro ao remover', 'error');
            }
        };
        
        window.limparComprados = async function() {
            if(!confirm('Remover todos os itens já comprados?')) return;
            
            try {
                const { error } = await supabase
                    .from('items')
                    .delete()
                    .eq('user_id', currentUser.id)
                    .eq('comprado', true);
                
                if(error) throw error;
                showToast('Itens comprados removidos!', 'success');
            } catch (error) {
                showToast('Erro ao limpar', 'error');
            }
        };
        
        window.logout = async function() {
            try {
                await supabase.auth.signOut();
                showToast('Até logo!', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 500);
            } catch (error) {
                showToast('Erro ao sair', 'error');
            }
        };
        
        // ============================================
        // CÁLCULO DE TOTAIS
        // ============================================
        function calcularTotais() {
            let totalGeral = 0;
            let totalComprado = 0;
            let totalPendente = 0;
            let itensComprados = 0;
            
            allItems.forEach(item => {
                const subtotal = (item.preco || 0) * (item.quantidade || 1);
                totalGeral += subtotal;
                
                if(item.comprado) {
                    totalComprado += subtotal;
                    itensComprados++;
                } else {
                    totalPendente += subtotal;
                }
            });
            
            const percentual = allItems.length > 0 ? (itensComprados / allItems.length) * 100 : 0;
            
            document.getElementById('total-geral').textContent = formatMoney(totalGeral);
            document.getElementById('total-pendente').textContent = formatMoney(totalPendente);
            document.getElementById('total-comprado').textContent = formatMoney(totalComprado);
            document.getElementById('progress-percent').textContent = `${Math.round(percentual)}%`;
            document.getElementById('progress-fill').style.width = `${percentual}%`;
        }
        
        // ============================================
        // RENDERIZAÇÃO
        // ============================================
        function renderizarLista() {
            let filteredItems = [...allItems];
            
            if(currentFilter === 'pending') {
                filteredItems = filteredItems.filter(i => !i.comprado);
            } else if(currentFilter === 'completed') {
                filteredItems = filteredItems.filter(i => i.comprado);
            } else if(currentFilter === 'high') {
                filteredItems = filteredItems.filter(i => i.prioridade === 1 && !i.comprado);
            }
            
            if(currentCategoria !== 'todos') {
                filteredItems = filteredItems.filter(i => i.categoria === currentCategoria);
            }
            
            filteredItems.sort((a, b) => {
                if(a.comprado !== b.comprado) return a.comprado ? 1 : -1;
                if(a.prioridade !== b.prioridade) return a.prioridade - b.prioridade;
                return new Date(b.created_at) - new Date(a.created_at);
            });
            
            if(filteredItems.length === 0) {
                listaElement.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🛒</div>
                        <p>Nenhum item encontrado</p>
                        <small>Clique no botão + para adicionar</small>
                    </div>
                `;
                return;
            }
            
            listaElement.innerHTML = filteredItems.map(item => {
                const subtotal = (item.preco || 0) * (item.quantidade || 1);
                const prioridade = prioridadeCores[item.prioridade];
                
                return `
                    <li class="list-item ${item.comprado ? 'comprado' : ''}" data-prioridade="${item.prioridade}">
                        <div class="item-checkbox-wrapper">
                            <input 
                                type="checkbox" 
                                ${item.comprado ? 'checked' : ''} 
                                onchange="toggleComprado('${item.id}', ${item.comprado})"
                                class="item-checkbox"
                            />
                        </div>
                        <div class="item-details" onclick="openDetailModal('${item.id}')">
                            <div class="item-header">
                                <span class="item-categoria">${categoriaIcones[item.categoria] || '📦'} ${item.categoria}</span>
                                <span class="item-prioridade" style="color: ${prioridade.cor}">
                                    ${prioridade.icon} ${prioridade.texto}
                                </span>
                            </div>
                            <div class="item-nome">${escapeHtml(item.nome)}</div>
                            ${item.marca ? `<div class="item-marca">🏷️ ${escapeHtml(item.marca)}</div>` : ''}
                            <div class="item-meta">
                                <span class="item-quantidade">📦 ${item.quantidade || 1} ${item.unidade || 'un'}</span>
                                ${item.preco ? `<span class="item-preco">💰 ${formatMoney(item.preco)}/un</span>` : ''}
                                <span class="item-total">📊 Total: ${formatMoney(subtotal)}</span>
                            </div>
                            ${item.observacao ? `<div class="item-obs">📝 ${escapeHtml(item.observacao.substring(0, 60))}${item.observacao.length > 60 ? '...' : ''}</div>` : ''}
                        </div>
                        <div class="item-actions">
                            <button onclick="openModal('${item.id}')" class="btn-edit" title="Editar">✏️</button>
                            <button onclick="removerItem('${item.id}')" class="btn-delete" title="Remover">🗑️</button>
                        </div>
                    </li>
                `;
            }).join('');
            
            calcularTotais();
        }
        
        // ============================================
        // CARREGAR DADOS
        // ============================================
        async function carregarLista() {
            if(!currentUser) return;
            
            if(subscription) {
                await subscription.unsubscribe();
            }
            
            subscription = supabase
                .channel('items-changes')
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'items',
                    filter: `user_id=eq.${currentUser.id}`
                }, () => {
                    fetchItems();
                })
                .subscribe();
            
            await fetchItems();
        }
        
        async function fetchItems() {
            const { data, error } = await supabase
                .from('items')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });
            
            if(error) {
                console.error(error);
                showToast('Erro ao carregar itens', 'error');
                return;
            }
            
            allItems = data || [];
            renderizarLista();
        }
        
        // ============================================
        // FILTROS
        // ============================================
        function initFilters() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderizarLista();
                });
            });
            
            document.querySelectorAll('.category-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    currentCategoria = chip.dataset.categoria;
                    renderizarLista();
                });
            });
        }
        
        // ============================================
        // AUTENTICAÇÃO
        // ============================================
        themeToggle?.addEventListener('click', toggleTheme);
        
        supabase.auth.onAuthStateChange(async (event, session) => {
            if(session) {
                currentUser = session.user;
                userEmailSpan.textContent = session.user.email;
                await carregarLista();
            } else {
                window.location.href = 'login.html';
            }
        });
        
        const { data: { session } } = await supabase.auth.getSession();
        if(session) {
            currentUser = session.user;
            userEmailSpan.textContent = session.user.email;
            await carregarLista();
        } else {
            window.location.href = 'login.html';
        }
        
        // Fechar modais
        modal.addEventListener('click', (e) => {
            if(e.target === modal) closeModal();
        });
        
        detailModal.addEventListener('click', (e) => {
            if(e.target === detailModal) closeDetailModal();
        });
        
        initTheme();
        initFilters();
        
        console.log('✅ Lista 2026 carregada com sucesso!');
    </script>
</body>
</html>
