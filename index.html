<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#10b981" id="theme-color">
    <link rel="shortcut icon" href="src/img/favicon.ico" type="image/x-icon">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="src/css/index.css">
    <title>Lista 2026 · Meu Mercado</title>
</head>
<body>
    <div class="app-container">
        <!-- Header Estilo Mercado -->
        <header class="market-header">
            <div class="header-top">
                <div class="logo-area">
                    <div class="logo-icon">🛒</div>
                    <h1 class="logo-text">Meu<span>Mercado</span></h1>
                </div>
                <div class="header-actions">
                    <button class="theme-toggle" id="theme-toggle">
                        <span class="theme-icon">🌙</span>
                    </button>
                    <button class="btn-cart" onclick="openCart()">
                        🛒
                        <span class="cart-badge" id="cart-badge">0</span>
                    </button>
                    <button class="btn-logout" onclick="logout()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                    </button>
                </div>
            </div>
            
            <!-- Barra de Busca -->
            <div class="search-bar">
                <div class="search-icon">🔍</div>
                <input type="text" id="search-input" placeholder="Buscar produtos..." autocomplete="off">
                <button class="filter-icon" id="open-filters">⚡</button>
            </div>
            
            <!-- Info do Cliente -->
            <div class="customer-info">
                <div class="customer-avatar">👤</div>
                <div class="customer-details">
                    <span class="customer-label">Entregar para</span>
                    <span class="customer-name" id="user-email">carregando...</span>
                </div>
            </div>
        </header>

        <!-- Banner Ofertas -->
        <div class="promo-banner">
            <div class="banner-content">
                <div class="banner-text">
                    <span class="banner-tag">🔥 OFERTA DO DIA</span>
                    <h3>Até 30% OFF</h3>
                    <p>em produtos selecionados</p>
                </div>
                <div class="banner-icon">🎯</div>
            </div>
        </div>

        <!-- Categorias Rápidas (Carrossel) -->
        <div class="categories-section">
            <h3>Categorias</h3>
            <div class="categories-carousel">
                <button class="cat-card active" data-categoria="todos">
                    <div class="cat-icon">🏠</div>
                    <span>Todos</span>
                </button>
                <button class="cat-card" data-categoria="mercearia">
                    <div class="cat-icon">🥫</div>
                    <span>Mercearia</span>
                </button>
                <button class="cat-card" data-categoria="hortifruti">
                    <div class="cat-icon">🥬</div>
                    <span>Hortifrúti</span>
                </button>
                <button class="cat-card" data-categoria="carnes">
                    <div class="cat-icon">🥩</div>
                    <span>Carnes</span>
                </button>
                <button class="cat-card" data-categoria="laticinios">
                    <div class="cat-icon">🥛</div>
                    <span>Laticínios</span>
                </button>
                <button class="cat-card" data-categoria="bebidas">
                    <div class="cat-icon">🥤</div>
                    <span>Bebidas</span>
                </button>
                <button class="cat-card" data-categoria="limpeza">
                    <div class="cat-icon">🧹</div>
                    <span>Limpeza</span>
                </button>
                <button class="cat-card" data-categoria="higiene">
                    <div class="cat-icon">🧴</div>
                    <span>Higiene</span>
                </button>
                <button class="cat-card" data-categoria="padaria">
                    <div class="cat-icon">🍞</div>
                    <span>Padaria</span>
                </button>
                <button class="cat-card" data-categoria="congelados">
                    <div class="cat-icon">❄️</div>
                    <span>Congelados</span>
                </button>
            </div>
        </div>

        <!-- Filtros -->
        <div class="filters-row" id="filters-panel" style="display: none;">
            <button class="filter-chip active" data-filter="all">Todos</button>
            <button class="filter-chip" data-filter="pending">Pendentes</button>
            <button class="filter-chip" data-filter="completed">Comprados</button>
            <button class="filter-chip" data-filter="high">Prioridade Alta</button>
            <button class="filter-chip" data-filter="low-price">Menor Preço</button>
            <button class="filter-chip" data-filter="high-price">Maior Preço</button>
        </div>

        <!-- Resumo do Carrinho Flutuante -->
        <div class="cart-summary" id="cart-summary" onclick="openCart()">
            <div class="cart-summary-content">
                <span class="cart-icon">🛒</span>
                <div class="cart-info">
                    <span class="cart-items" id="cart-items-count">0 itens</span>
                    <span class="cart-total" id="cart-total-value">R$ 0,00</span>
                </div>
                <button class="cart-view-btn">Ver carrinho →</button>
            </div>
        </div>

        <!-- Lista de Produtos (Estilo Mercado) -->
        <main class="products-grid" id="products-grid">
            <!-- Produtos serão inseridos aqui -->
        </main>

        <!-- Modal do Carrinho -->
        <div id="cart-modal" class="modal">
            <div class="modal-content cart-modal-content">
                <div class="modal-header">
                    <h2>🛒 Meu Carrinho</h2>
                    <button class="modal-close" onclick="closeCart()">&times;</button>
                </div>
                <div id="cart-items-list" class="cart-items-list"></div>
                <div class="cart-footer">
                    <div class="cart-total-section">
                        <span>Total:</span>
                        <span class="cart-grand-total" id="cart-grand-total">R$ 0,00</span>
                    </div>
                    <div class="cart-actions">
                        <button class="btn-clear-cart" onclick="clearCart()">Limpar carrinho</button>
                        <button class="btn-checkout" onclick="checkout()">Finalizar compra ✅</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal de Detalhes do Produto -->
        <div id="product-modal" class="modal">
            <div class="modal-content product-modal-content">
                <button class="modal-close" onclick="closeProductModal()">&times;</button>
                <div id="product-detail" class="product-detail"></div>
            </div>
        </div>

        <!-- Modal de Adicionar Produto -->
        <div id="add-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Adicionar Produto</h2>
                    <button class="modal-close" onclick="closeAddModal()">&times;</button>
                </div>
                <form id="product-form">
                    <input type="hidden" id="product-id">
                    
                    <div class="form-group">
                        <label>Nome do produto *</label>
                        <input type="text" id="product-nome" required placeholder="Ex: Arroz, Feijão...">
                    </div>

                    <div class="form-group">
                        <label>Marca</label>
                        <input type="text" id="product-marca" placeholder="Ex: Tio João, Nestlé">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Quantidade</label>
                            <input type="number" id="product-quantidade" value="1" min="0.01" step="0.01">
                        </div>
                        <div class="form-group">
                            <label>Unidade</label>
                            <select id="product-unidade">
                                <option value="un">Unidade</option>
                                <option value="kg">Quilograma</option>
                                <option value="g">Grama</option>
                                <option value="l">Litro</option>
                                <option value="ml">Mililitro</option>
                                <option value="pac">Pacote</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Preço (R$)</label>
                            <input type="number" id="product-preco" step="0.01" placeholder="0,00">
                        </div>
                        <div class="form-group">
                            <label>Categoria</label>
                            <select id="product-categoria">
                                <option value="mercearia">🥫 Mercearia</option>
                                <option value="hortifruti">🥬 Hortifrúti</option>
                                <option value="carnes">🥩 Carnes</option>
                                <option value="laticinios">🥛 Laticínios</option>
                                <option value="bebidas">🥤 Bebidas</option>
                                <option value="limpeza">🧹 Limpeza</option>
                                <option value="higiene">🧴 Higiene</option>
                                <option value="padaria">🍞 Padaria</option>
                                <option value="congelados">❄️ Congelados</option>
                                <option value="outros">📦 Outros</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Prioridade</label>
                        <div class="priority-select">
                            <label class="priority-option">
                                <input type="radio" name="prioridade" value="1"> 🔴 Alta
                            </label>
                            <label class="priority-option">
                                <input type="radio" name="prioridade" value="2" checked> 🟡 Média
                            </label>
                            <label class="priority-option">
                                <input type="radio" name="prioridade" value="3"> 🟢 Baixa
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Descrição</label>
                        <textarea id="product-desc" rows="2" placeholder="Informações adicionais..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>URL da imagem (opcional)</label>
                        <input type="url" id="product-imagem" placeholder="https://exemplo.com/produto.jpg">
                    </div>

                    <div class="modal-buttons">
                        <button type="button" class="btn-cancel" onclick="closeAddModal()">Cancelar</button>
                        <button type="submit" class="btn-save">Salvar produto</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Botão Flutuante para Adicionar -->
        <button class="fab" onclick="openAddModal()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
        </button>
    </div>

    <script type="module">
        // ============================================
        // CONFIGURAÇÃO SUPABASE
        // ============================================
        const SUPABASE_URL = 'https://pquobavzpooyygfoczpn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxdW9iYXZ6cG9veXlnZm9jenBuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMTE5NDQsImV4cCI6MjA4NzY4Nzk0NH0.-6WeJxqq_bzYD0chC1SF2iZzpK96FzWtl3xmcjeuRi4';
        
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // ============================================
        // VARIÁVEIS
        // ============================================
        let currentUser = null;
        let allProducts = [];
        let cart = JSON.parse(localStorage.getItem('market_cart') || '[]');
        let currentCategory = 'todos';
        let currentFilter = 'all';
        let searchTerm = '';
        let subscription = null;
        
        // Elementos
        const productsGrid = document.getElementById('products-grid');
        const userEmailSpan = document.getElementById('user-email');
        const themeToggle = document.getElementById('theme-toggle');
        const searchInput = document.getElementById('search-input');
        const filtersPanel = document.getElementById('filters-panel');
        const openFiltersBtn = document.getElementById('open-filters');
        
        // ============================================
        // FUNÇÕES DE UI
        // ============================================
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            const icon = themeToggle?.querySelector('.theme-icon');
            if(icon) icon.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
        }
        
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            const icon = themeToggle?.querySelector('.theme-icon');
            if(icon) icon.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        }
        
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span>${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'}</span> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        function formatMoney(value) {
            if(!value || isNaN(value)) return 'R$ 0,00';
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(value);
        }
        
        // ============================================
        // CARRINHO
        // ============================================
        function saveCart() {
            localStorage.setItem('market_cart', JSON.stringify(cart));
            updateCartUI();
        }
        
        function updateCartUI() {
            const totalItems = cart.reduce((sum, item) => sum + item.quantidade, 0);
            const totalValue = cart.reduce((sum, item) => sum + (item.preco * item.quantidade), 0);
            
            document.getElementById('cart-badge').textContent = totalItems;
            document.getElementById('cart-items-count').textContent = `${totalItems} ${totalItems === 1 ? 'item' : 'itens'}`;
            document.getElementById('cart-total-value').textContent = formatMoney(totalValue);
            
            const cartSummary = document.getElementById('cart-summary');
            if(totalItems > 0) {
                cartSummary.classList.add('visible');
            } else {
                cartSummary.classList.remove('visible');
            }
        }
        
        function addToCart(product, quantidade = 1) {
            const existing = cart.find(item => item.id === product.id);
            if(existing) {
                existing.quantidade += quantidade;
            } else {
                cart.push({
                    id: product.id,
                    nome: product.nome,
                    marca: product.marca,
                    preco: product.preco || 0,
                    unidade: product.unidade,
                    imagem: product.imagem,
                    quantidade: quantidade
                });
            }
            saveCart();
            showToast(`${product.nome} adicionado ao carrinho!`, 'success');
        }
        
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            saveCart();
            renderCartModal();
        }
        
        function updateCartItemQuantity(productId, quantidade) {
            const item = cart.find(item => item.id === productId);
            if(item) {
                if(quantidade <= 0) {
                    removeFromCart(productId);
                } else {
                    item.quantidade = quantidade;
                    saveCart();
                }
            }
            renderCartModal();
        }
        
        window.openCart = function() {
            renderCartModal();
            document.getElementById('cart-modal').classList.add('show');
        };
        
        window.closeCart = function() {
            document.getElementById('cart-modal').classList.remove('show');
        };
        
        window.clearCart = function() {
            if(confirm('Limpar todo o carrinho?')) {
                cart = [];
                saveCart();
                renderCartModal();
                showToast('Carrinho limpo!', 'success');
            }
        };
        
        window.checkout = function() {
            if(cart.length === 0) {
                showToast('Seu carrinho está vazio!', 'error');
                return;
            }
            
            const total = cart.reduce((sum, item) => sum + (item.preco * item.quantidade), 0);
            alert(`🛒 Compra finalizada!\n\nTotal: ${formatMoney(total)}\n\nItens comprados:\n${cart.map(item => `- ${item.nome} x${item.quantidade} = ${formatMoney(item.preco * item.quantidade)}`).join('\n')}\n\nObrigado por comprar conosco!`);
            
            // Marcar produtos como comprados no banco
            cart.forEach(async (item) => {
                await supabase
                    .from('items')
                    .update({ comprado: true })
                    .eq('id', item.id)
                    .eq('user_id', currentUser.id);
            });
            
            cart = [];
            saveCart();
            closeCart();
            showToast('Compra finalizada com sucesso!', 'success');
        };
        
        function renderCartModal() {
            const cartList = document.getElementById('cart-items-list');
            const grandTotal = cart.reduce((sum, item) => sum + (item.preco * item.quantidade), 0);
            
            if(cart.length === 0) {
                cartList.innerHTML = '<div class="empty-cart">🛒 Seu carrinho está vazio</div>';
            } else {
                cartList.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${escapeHtml(item.nome)}</div>
                            <div class="cart-item-marca">${item.marca ? escapeHtml(item.marca) : ''}</div>
                            <div class="cart-item-price">${formatMoney(item.preco)}/un</div>
                        </div>
                        <div class="cart-item-controls">
                            <button onclick="updateCartItemQuantity('${item.id}', ${item.quantidade - 1})">-</button>
                            <span>${item.quantidade}</span>
                            <button onclick="updateCartItemQuantity('${item.id}', ${item.quantidade + 1})">+</button>
                            <button class="remove-btn" onclick="removeFromCart('${item.id}')">🗑️</button>
                        </div>
                        <div class="cart-item-total">${formatMoney(item.preco * item.quantidade)}</div>
                    </div>
                `).join('');
            }
            
            document.getElementById('cart-grand-total').textContent = formatMoney(grandTotal);
        }
        
        // ============================================
        // CRUD PRODUTOS
        // ============================================
        window.openAddModal = function(productId = null) {
            if(productId) {
                const product = allProducts.find(p => p.id === productId);
                if(product) {
                    document.getElementById('product-id').value = product.id;
                    document.getElementById('product-nome').value = product.nome;
                    document.getElementById('product-marca').value = product.marca || '';
                    document.getElementById('product-quantidade').value = product.quantidade || 1;
                    document.getElementById('product-unidade').value = product.unidade || 'un';
                    document.getElementById('product-preco').value = product.preco || '';
                    document.getElementById('product-categoria').value = product.categoria || 'outros';
                    document.getElementById('product-desc').value = product.observacao || '';
                    document.getElementById('product-imagem').value = product.imagem || '';
                    
                    document.querySelectorAll('input[name="prioridade"]').forEach(radio => {
                        radio.checked = radio.value == product.prioridade;
                    });
                }
            } else {
                document.getElementById('product-form').reset();
                document.getElementById('product-id').value = '';
                document.getElementById('product-quantidade').value = 1;
            }
            document.getElementById('add-modal').classList.add('show');
        };
        
        window.closeAddModal = function() {
            document.getElementById('add-modal').classList.remove('show');
        };
        
        window.openProductDetail = function(productId) {
            const product = allProducts.find(p => p.id === productId);
            if(!product) return;
            
            const detailDiv = document.getElementById('product-detail');
            detailDiv.innerHTML = `
                <div class="product-detail-image">
                    ${product.imagem ? `<img src="${escapeHtml(product.imagem)}" alt="${escapeHtml(product.nome)}">` : '<div class="no-image">🛒</div>'}
                </div>
                <div class="product-detail-info">
                    <h2>${escapeHtml(product.nome)}</h2>
                    ${product.marca ? `<p class="product-detail-marca">🏷️ ${escapeHtml(product.marca)}</p>` : ''}
                    <p class="product-detail-categoria">${getCategoryIcon(product.categoria)} ${product.categoria}</p>
                    <div class="product-detail-price">
                        <span class="price-label">Preço</span>
                        <span class="price-value">${formatMoney(product.preco)}</span>
                        <span class="price-unit">/ ${product.unidade || 'un'}</span>
                    </div>
                    ${product.observacao ? `<div class="product-detail-desc">📝 ${escapeHtml(product.observacao)}</div>` : ''}
                    <div class="product-detail-actions">
                        <div class="quantity-selector">
                            <button onclick="changeQuantity(${product.id}, -1)">-</button>
                            <span id="qty-${product.id}">1</span>
                            <button onclick="changeQuantity(${product.id}, 1)">+</button>
                        </div>
                        <button class="btn-add-cart" onclick="addToCartFromDetail('${product.id}')">
                            🛒 Adicionar ao carrinho
                        </button>
                    </div>
                </div>
            `;
            
            window.currentDetailProduct = product;
            document.getElementById('product-modal').classList.add('show');
        };
        
        window.changeQuantity = function(productId, delta) {
            const span = document.getElementById(`qty-${productId}`);
            let current = parseInt(span.textContent);
            current = Math.max(1, current + delta);
            span.textContent = current;
        };
        
        window.addToCartFromDetail = function(productId) {
            const qty = parseInt(document.getElementById(`qty-${productId}`).textContent);
            const product = allProducts.find(p => p.id === productId);
            if(product) {
                addToCart(product, qty);
                closeProductModal();
            }
        };
        
        window.closeProductModal = function() {
            document.getElementById('product-modal').classList.remove('show');
        };
        
        document.getElementById('product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('product-id').value;
            const nome = document.getElementById('product-nome').value.trim();
            const marca = document.getElementById('product-marca').value.trim();
            const quantidade = parseFloat(document.getElementById('product-quantidade').value) || 1;
            const unidade = document.getElementById('product-unidade').value;
            const preco = parseFloat(document.getElementById('product-preco').value) || null;
            const categoria = document.getElementById('product-categoria').value;
            const prioridade = parseInt(document.querySelector('input[name="prioridade"]:checked')?.value || 2);
            const observacao = document.getElementById('product-desc').value;
            const imagem = document.getElementById('product-imagem').value;
            
            if(!nome) {
                showToast('Digite o nome do produto', 'error');
                return;
            }
            
            const productData = {
                nome,
                marca,
                quantidade,
                unidade,
                preco,
                categoria,
                prioridade,
                observacao,
                imagem,
                user_id: currentUser.id
            };
            
            try {
                if(id) {
                    await supabase.from('items').update(productData).eq('id', id).eq('user_id', currentUser.id);
                    showToast('Produto atualizado!', 'success');
                } else {
                    await supabase.from('items').insert([productData]);
                    showToast('Produto adicionado!', 'success');
                }
                closeAddModal();
            } catch (error) {
                showToast('Erro ao salvar', 'error');
            }
        });
        
        window.removerProduto = async function(productId) {
            if(!confirm('Remover este produto?')) return;
            try {
                await supabase.from('items').delete().eq('id', productId).eq('user_id', currentUser.id);
                showToast('Produto removido!', 'success');
            } catch (error) {
                showToast('Erro ao remover', 'error');
            }
        };
        
        window.toggleComprado = async function(productId, comprado) {
            try {
                await supabase.from('items').update({ comprado: !comprado }).eq('id', productId).eq('user_id', currentUser.id);
            } catch (error) {
                showToast('Erro ao atualizar', 'error');
            }
        };
        
        // ============================================
        // RENDERIZAÇÃO PRODUTOS
        // ============================================
        function getCategoryIcon(categoria) {
            const icons = {
                mercearia: '🥫',
                hortifruti: '🥬',
                carnes: '🥩',
                laticinios: '🥛',
                bebidas: '🥤',
                limpeza: '🧹',
                higiene: '🧴',
                padaria: '🍞',
                congelados: '❄️',
                outros: '📦'
            };
            return icons[categoria] || '📦';
        }
        
        function escapeHtml(text) {
            if(!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function renderProducts() {
            let filtered = [...allProducts];
            
            // Busca
            if(searchTerm) {
                filtered = filtered.filter(p => 
                    p.nome.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    (p.marca && p.marca.toLowerCase().includes(searchTerm.toLowerCase()))
                );
            }
            
            // Categoria
            if(currentCategory !== 'todos') {
                filtered = filtered.filter(p => p.categoria === currentCategory);
            }
            
            // Filtro de status
            if(currentFilter === 'pending') {
                filtered = filtered.filter(p => !p.comprado);
            } else if(currentFilter === 'completed') {
                filtered = filtered.filter(p => p.comprado);
            } else if(currentFilter === 'high') {
                filtered = filtered.filter(p => p.prioridade === 1 && !p.comprado);
            } else if(currentFilter === 'low-price') {
                filtered.sort((a, b) => (a.preco || 0) - (b.preco || 0));
            } else if(currentFilter === 'high-price') {
                filtered.sort((a, b) => (b.preco || 0) - (a.preco || 0));
            }
            
            if(filtered.length === 0) {
                productsGrid.innerHTML = `
                    <div class="empty-products">
                        <div class="empty-icon">🛒</div>
                        <p>Nenhum produto encontrado</p>
                        <small>Clique no botão + para adicionar</small>
                    </div>
                `;
                return;
            }
            
            productsGrid.innerHTML = filtered.map(product => `
                <div class="product-card ${product.comprado ? 'comprado' : ''}">
                    <div class="product-badge">${getCategoryIcon(product.categoria)}</div>
                    <div class="product-image" onclick="openProductDetail('${product.id}')">
                        ${product.imagem ? `<img src="${escapeHtml(product.imagem)}" alt="${escapeHtml(product.nome)}">` : `<div class="product-placeholder">${getCategoryIcon(product.categoria)}</div>`}
                    </div>
                    <div class="product-info">
                        <h4 class="product-title" onclick="openProductDetail('${product.id}')">${escapeHtml(product.nome)}</h4>
                        ${product.marca ? `<p class="product-brand">${escapeHtml(product.marca)}</p>` : ''}
                        <div class="product-price-section">
                            <span class="product-price">${formatMoney(product.preco)}</span>
                            <span class="product-unit">/${product.unidade || 'un'}</span>
                        </div>
                        <div class="product-actions">
                            <button class="btn-buy" onclick="addToCart(${JSON.stringify(product).replace(/"/g, '&quot;')}, 1)">
                                🛒 Comprar
                            </button>
                            <button class="btn-edit-small" onclick="openAddModal('${product.id}')">✏️</button>
                            <button class="btn-delete-small" onclick="removerProduto('${product.id}')">🗑️</button>
                        </div>
                        <div class="product-checkout">
                            <input type="checkbox" ${product.comprado ? 'checked' : ''} onchange="toggleComprado('${product.id}', ${product.comprado})">
                            <span>Já comprei</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // ============================================
        // CARREGAR DADOS
        // ============================================
        async function loadProducts() {
            if(!currentUser) return;
            
            if(subscription) {
                await subscription.unsubscribe();
            }
            
            subscription = supabase
                .channel('items-changes')
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'items',
                    filter: `user_id=eq.${currentUser.id}`
                }, () => {
                    fetchProducts();
                })
                .subscribe();
            
            await fetchProducts();
        }
        
        async function fetchProducts() {
            const { data, error } = await supabase
                .from('items')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });
            
            if(error) {
                console.error(error);
                return;
            }
            
            allProducts = data || [];
            renderProducts();
        }
        
        // ============================================
        // FILTROS E CATEGORIAS
        // ============================================
        function initFilters() {
            // Categorias
            document.querySelectorAll('.cat-card').forEach(card => {
                card.addEventListener('click', () => {
                    document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    currentCategory = card.dataset.categoria;
                    renderProducts();
                });
            });
            
            // Filtros
            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    currentFilter = chip.dataset.filter;
                    renderProducts();
                });
            });
            
            // Busca
            searchInput?.addEventListener('input', (e) => {
                searchTerm = e.target.value;
                renderProducts();
            });
            
            // Abrir/fechar filtros
            openFiltersBtn?.addEventListener('click', () => {
                if(filtersPanel.style.display === 'none') {
                    filtersPanel.style.display = 'flex';
                } else {
                    filtersPanel.style.display = 'none';
                }
            });
        }
        
        // ============================================
        // LOGOUT
        // ============================================
        window.logout = async function() {
            await supabase.auth.signOut();
            showToast('Até logo!', 'success');
            setTimeout(() => window.location.href = 'login.html', 500);
        };
        
        // ============================================
        // INICIALIZAÇÃO
        // ============================================
        themeToggle?.addEventListener('click', toggleTheme);
        
        supabase.auth.onAuthStateChange(async (event, session) => {
            if(session) {
                currentUser = session.user;
                userEmailSpan.textContent = session.user.email;
                await loadProducts();
                updateCartUI();
            } else {
                window.location.href = 'login.html';
            }
        });
        
        const { data: { session } } = await supabase.auth.getSession();
        if(session) {
            currentUser = session.user;
            userEmailSpan.textContent = session.user.email;
            await loadProducts();
            updateCartUI();
        } else {
            window.location.href = 'login.html';
        }
        
        // Close modals
        document.getElementById('cart-modal')?.addEventListener('click', (e) => {
            if(e.target === document.getElementById('cart-modal')) closeCart();
        });
        document.getElementById('product-modal')?.addEventListener('click', (e) => {
            if(e.target === document.getElementById('product-modal')) closeProductModal();
        });
        document.getElementById('add-modal')?.addEventListener('click', (e) => {
            if(e.target === document.getElementById('add-modal')) closeAddModal();
        });
        
        initTheme();
        initFilters();
        
        // Expor funções globais
        window.addToCart = addToCart;
        window.removeFromCart = removeFromCart;
        window.updateCartItemQuantity = updateCartItemQuantity;
        
        console.log('✅ Mercado Lista 2026 carregado!');
    </script>
</body>
</html>
