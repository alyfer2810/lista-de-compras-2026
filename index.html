<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1" id="theme-color">
    <link rel="shortcut icon" href="src/img/favicon.ico" type="image/x-icon">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="src/css/index.css">
    <title>Lista 2026 · Minhas Compras</title>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <div class="logo-area">
                    <div class="logo-icon">🛒</div>
                    <h1 class="logo-text">Lista<span>2026</span></h1>
                </div>
                <div class="header-actions">
                    <button class="theme-toggle" id="theme-toggle" aria-label="Alternar tema">
                        <span class="theme-icon">🌙</span>
                    </button>
                    <button class="btn-logout" onclick="logout()" title="Sair">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="user-info">
                <span class="user-email" id="user-email">carregando...</span>
            </div>
        </header>
        
        <main class="main-content">
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-label">Itens</span>
                    <span class="stat-value" id="total-count">0</span>
                </div>
                <button class="btn-clear" onclick="limparComprados()" title="Limpar comprados">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                    Limpar comprados
                </button>
            </div>
            
            <ul id="lista" class="shopping-list"></ul>
            
            <div class="add-item-section">
                <div class="input-wrapper">
                    <input type="text" id="item" placeholder="Digite um item..." autocomplete="off"/>
                    <button onclick="adicionarItem()" class="btn-add">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        Adicionar
                    </button>
                </div>
            </div>
        </main>
        
        <footer class="footer">
            <p>Compras compartilhadas em tempo real ✨</p>
        </footer>
    </div>

    <script type="module">
        // SUAS CREDENCIAIS DO SUPABASE
        const SUPABASE_URL = 'https://pquobavzpooyygfoczpn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxdW9iYXZ6cG9veXlnZm9jenBuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMTE5NDQsImV4cCI6MjA4NzY4Nzk0NH0.-6WeJxqq_bzYD0chC1SF2iZzpK96FzWtl3xmcjeuRi4';
        
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Elementos
        const listaElement = document.getElementById('lista');
        const itemInput = document.getElementById('item');
        const userEmailSpan = document.getElementById('user-email');
        const themeToggle = document.getElementById('theme-toggle');
        let currentUser = null;
        let subscription = null;
        
        // Tema
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            const icon = themeToggle?.querySelector('.theme-icon');
            if(icon) icon.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
        }
        
        function updateThemeIcon(theme) {
            const icon = themeToggle?.querySelector('.theme-icon');
            if(icon) icon.textContent = theme === 'dark' ? '☀️' : '🌙';
        }
        
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }
        
        function showToast(message, type = 'info') {
            const existingToast = document.querySelector('.toast');
            if(existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Adicionar item
        window.adicionarItem = async function() {
            const nome = itemInput.value.trim();
            if(!nome) {
                showToast('Digite um item para adicionar', 'error');
                return;
            }
            
            if(!currentUser) {
                showToast('Usuário não autenticado', 'error');
                return;
            }
            
            try {
                const { error } = await supabase
                    .from('items')
                    .insert({
                        nome: nome,
                        comprado: false,
                        user_id: currentUser.id
                    });
                
                if(error) throw error;
                
                itemInput.value = '';
                itemInput.focus();
                showToast('Item adicionado!', 'success');
            } catch (error) {
                console.error(error);
                showToast('Erro ao adicionar item', 'error');
            }
        };
        
        // Alternar status
        window.toggleComprado = async function(itemId, compradoAtual) {
            if(!currentUser) return;
            
            try {
                const { error } = await supabase
                    .from('items')
                    .update({ comprado: !compradoAtual })
                    .eq('id', itemId)
                    .eq('user_id', currentUser.id);
                
                if(error) throw error;
            } catch (error) {
                showToast('Erro ao atualizar', 'error');
            }
        };
        
        // Remover item
        window.removerItem = async function(itemId) {
            if(!confirm('Tem certeza que deseja remover este item?')) return;
            if(!currentUser) return;
            
            try {
                const { error } = await supabase
                    .from('items')
                    .delete()
                    .eq('id', itemId)
                    .eq('user_id', currentUser.id);
                
                if(error) throw error;
                showToast('Item removido!', 'success');
            } catch (error) {
                showToast('Erro ao remover', 'error');
            }
        };
        
        // Editar item
        window.editarItem = async function(itemId, nomeAtual) {
            const novoNome = prompt('Editar item:', nomeAtual);
            if(!novoNome || novoNome.trim() === '') return;
            if(!currentUser) return;
            
            try {
                const { error } = await supabase
                    .from('items')
                    .update({ nome: novoNome.trim() })
                    .eq('id', itemId)
                    .eq('user_id', currentUser.id);
                
                if(error) throw error;
                showToast('Item atualizado!', 'success');
            } catch (error) {
                showToast('Erro ao editar', 'error');
            }
        };
        
        // Limpar comprados
        window.limparComprados = async function() {
            if(!currentUser) return;
            if(!confirm('Remover todos os itens já comprados?')) return;
            
            try {
                const { error } = await supabase
                    .from('items')
                    .delete()
                    .eq('user_id', currentUser.id)
                    .eq('comprado', true);
                
                if(error) throw error;
                showToast('Itens comprados removidos!', 'success');
            } catch (error) {
                showToast('Erro ao limpar', 'error');
            }
        };
        
        // Logout
        window.logout = async function() {
            try {
                await supabase.auth.signOut();
                showToast('Até logo!', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 500);
            } catch (error) {
                showToast('Erro ao sair', 'error');
            }
        };
        
        // Carregar lista
        async function carregarLista() {
            if(!currentUser) return;
            
            // Se já existe subscription, remove
            if(subscription) {
                await subscription.unsubscribe();
            }
            
            // Subscribe para mudanças em tempo real
            subscription = supabase
                .channel('items-changes')
                .on(
                    'postgres_changes',
                    {
                        event: '*',
                        schema: 'public',
                        table: 'items',
                        filter: `user_id=eq.${currentUser.id}`
                    },
                    () => {
                        carregarDados();
                    }
                )
                .subscribe();
            
            async function carregarDados() {
                const { data, error } = await supabase
                    .from('items')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .order('created_at', { ascending: false });
                
                if(error) {
                    console.error(error);
                    return;
                }
                
                listaElement.innerHTML = '';
                
                if(!data || data.length === 0) {
                    listaElement.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">🛒</div>
                            <p>Sua lista está vazia</p>
                            <small>Adicione itens para começar</small>
                        </div>
                    `;
                    const totalCount = document.getElementById('total-count');
                    if(totalCount) totalCount.textContent = '0';
                    return;
                }
                
                data.forEach((item) => {
                    const li = document.createElement('li');
                    li.className = item.comprado ? 'comprado' : '';
                    
                    li.innerHTML = `
                        <div class="item-content">
                            <input 
                                type="checkbox" 
                                ${item.comprado ? 'checked' : ''} 
                                onchange="toggleComprado('${item.id}', ${item.comprado})"
                                class="item-checkbox"
                            />
                            <span class="item-nome">${escapeHtml(item.nome)}</span>
                        </div>
                        <div class="item-actions">
                            <button onclick="editarItem('${item.id}', '${escapeHtml(item.nome)}')" class="btn-edit" title="Editar">✏️</button>
                            <button onclick="removerItem('${item.id}')" class="btn-delete" title="Remover">🗑️</button>
                        </div>
                    `;
                    
                    listaElement.appendChild(li);
                });
                
                const totalCount = document.getElementById('total-count');
                if(totalCount) totalCount.textContent = data.length;
            }
            
            carregarDados();
        }
        
        // Tecla Enter
        itemInput?.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') window.adicionarItem();
        });
        
        // Tema
        themeToggle?.addEventListener('click', toggleTheme);
        
        // Monitorar autenticação
        supabase.auth.onAuthStateChange(async (event, session) => {
            if(session) {
                currentUser = session.user;
                userEmailSpan.textContent = session.user.email;
                await carregarLista();
            } else {
                window.location.href = 'login.html';
            }
        });
        
        // Verificar sessão existente
        const { data: { session } } = await supabase.auth.getSession();
        if(session) {
            currentUser = session.user;
            userEmailSpan.textContent = session.user.email;
            await carregarLista();
        } else {
            window.location.href = 'login.html';
        }
        
        initTheme();
        console.log('✅ Index page carregada com sucesso!');
    </script>
</body>
</html>
