<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1">
    <link rel="shortcut icon" href="src/img/favicon.ico" type="image/x-icon">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="src/css/login.css">
    <title>Lista 2026 · Login</title>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Logo e branding -->
            <div class="brand">
                <div class="logo-icon">🛒</div>
                <h1 class="brand-title">Lista<span>2026</span></h1>
                <p class="brand-subtitle">Compras compartilhadas em tempo real</p>
            </div>

            <!-- Toggle entre login e cadastro -->
            <div class="auth-toggle">
                <button class="toggle-btn active" data-auth="login">Entrar</button>
                <button class="toggle-btn" data-auth="signup">Criar conta</button>
            </div>

            <!-- Formulário de Login -->
            <form id="login-form" class="auth-form active">
                <div class="input-group">
                    <div class="input-icon">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                        <input type="email" id="login-email" placeholder=" " autocomplete="email">
                        <label>E-mail</label>
                    </div>
                    <div class="error-message" id="login-email-error"></div>
                </div>

                <div class="input-group">
                    <div class="input-icon">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="login-password" placeholder=" " autocomplete="current-password">
                        <label>Senha</label>
                        <button type="button" class="toggle-password" tabindex="-1">
                            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <div class="error-message" id="login-password-error"></div>
                </div>

                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" id="remember-me">
                        <span>Lembrar-me</span>
                    </label>
                    <a href="#" class="forgot-password">Esqueci a senha?</a>
                </div>

                <button type="submit" class="btn-primary">
                    <span class="btn-text">Entrar</span>
                    <div class="btn-spinner hidden"></div>
                </button>
            </form>

            <!-- Formulário de Cadastro -->
            <form id="signup-form" class="auth-form">
                <div class="input-group">
                    <div class="input-icon">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" id="signup-name" placeholder=" " autocomplete="name">
                        <label>Nome completo</label>
                    </div>
                    <div class="error-message" id="signup-name-error"></div>
                </div>

                <div class="input-group">
                    <div class="input-icon">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                        <input type="email" id="signup-email" placeholder=" " autocomplete="email">
                        <label>E-mail</label>
                    </div>
                    <div class="error-message" id="signup-email-error"></div>
                </div>

                <div class="input-group">
                    <div class="input-icon">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="signup-password" placeholder=" " autocomplete="new-password">
                        <label>Senha (min. 6 caracteres)</label>
                        <button type="button" class="toggle-password" tabindex="-1">
                            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <div class="error-message" id="signup-password-error"></div>
                </div>

                <button type="submit" class="btn-primary">
                    <span class="btn-text">Criar conta</span>
                    <div class="btn-spinner hidden"></div>
                </button>
            </form>

            <!-- Divisor social -->
            <div class="social-divider">
                <span>ou continue com</span>
            </div>

            <div class="social-buttons">
                <button class="btn-social google">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Google
                </button>
                <button class="btn-social apple">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01z"/>
                        <path d="M14.07 4.26c.64-.86 1.08-2.01.87-3.26-1.03.06-2.22.66-2.96 1.48-.66.72-1.24 1.84-1.07 2.94 1.16.08 2.34-.53 3.16-1.16z"/>
                    </svg>
                    Apple
                </button>
            </div>

            <p class="terms">
                Ao continuar, você concorda com nossos <a href="#">Termos</a> e <a href="#">Política de Privacidade</a>.
            </p>
        </div>
    </div>

    <script type="module">
        // Aqui vai sua lógica de autenticação (Firebase ou mock)
        // Exemplo de toggle entre login/cadastro
        const toggleBtns = document.querySelectorAll('.toggle-btn');
        const forms = {
            login: document.getElementById('login-form'),
            signup: document.getElementById('signup-form')
        };

        toggleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const authType = btn.dataset.auth;
                toggleBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                Object.keys(forms).forEach(key => {
                    forms[key].classList.remove('active');
                });
                forms[authType].classList.add('active');
            });
        });

        // Mostrar/ocultar senha
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = this.parentElement.querySelector('input');
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                this.querySelector('.eye-icon').style.opacity = type === 'password' ? '1' : '0.5';
            });
        });

        // Validação simples (mock)
        const loginForm = document.getElementById('login-form');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            // Simular loading
            const btn = loginForm.querySelector('.btn-primary');
            btn.classList.add('loading');
            
            setTimeout(() => {
                btn.classList.remove('loading');
                if(email && password) {
                    window.location.href = 'index.html';
                } else {
                    alert('Preencha e-mail e senha');
                }
            }, 800);
        });
    </script>
</body>
</html>
